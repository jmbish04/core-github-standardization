name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Prevents multiple runs on the same PR from overlapping
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to see commit history and changed files

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.1'

      - name: Install dependencies
        run: bun install

      # Quality Checks
      - name: Check Formatting (warning only)
        id: format
        continue-on-error: true
        run: |
          bun run format:check || echo "::warning::Formatting issues detected. Run 'bun run format' locally."

      - name: Type Check
        id: types
        continue-on-error: true
        run: bun run typecheck

      - name: Run Tests
        id: tests
        continue-on-error: true
        run: bun run test

      - name: Production Build
        id: build
        continue-on-error: true
        run: bun run build

      - name: Smoke Test
        id: smoke
        continue-on-error: true
        run: bun run test:smoke

      - name: Fail Job if Errors
        if: always()
        run: |
          if [ "${{ steps.types.outcome }}" = "failure" ] || \
             [ "${{ steps.tests.outcome }}" = "failure" ] || \
             [ "${{ steps.build.outcome }}" = "failure" ] || \
             [ "${{ steps.smoke.outcome }}" = "failure" ]; then
            echo "One or more checks failed."
            exit 1
          fi

  cloudflare-build-remediation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # Check out the PR branch directly so Jules can commit to it

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDKs
        # Install requests for the CF API and the Jules SDK
        run: pip install requests google-jules-sdk==0.0.6

      - name: Run Cloudflare Log Analyzer & Fixer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: python .github/scripts/jules-cloudflare-fix.py
