name: Research Judge Agent

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Research target (e.g., astro shadcn assistant-ui)"
        required: true
        default: "astro shadcn assistant-ui"
  repository_dispatch:
    # Triggered via POST from your Cloudflare Worker
    types: [research-judge]

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install litellm pydantic requests openai PyGithub

      - name: Execute Research Agent Script
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_GATEWAY_ID: ${{ secrets.CLOUDFLARE_GATEWAY_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Fallback gracefully if triggered via API payload instead of manual UI dispatch
          USER_PROMPT: ${{ github.event.inputs.query || github.event.client_payload.query }}
          CALLBACK_URL: "${{ secrets.WORKER_API_URL_BASE }}/api/webhooks/research-judge"
        run: python .github/scripts/agents/research.py
