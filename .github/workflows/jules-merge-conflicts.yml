# Inspired by @google/jules-fleet conflict detection pattern
name: PR Conflict Detection

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Attempt merge
        id: merge
        continue-on-error: true
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git merge origin/${{ github.event.pull_request.base.ref }} --no-commit --no-ff

      - name: Check for conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          npx -y --package=@google/jules-merge jules-merge check-conflicts --repo ${{ github.repository }} --pr ${{ github.event.pull_request.number }} --sha ${{ github.event.pull_request.head.sha }}
          

      - name: Report conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          echo "::error::⚠️ Merge conflicts detected in PR #${{ github.event.pull_request.number }}"
          echo ""
          echo "Conflicted files:"
          git diff --name-only --diff-filter=U
          echo ""
          echo "Please resolve these conflicts manually or rebase your branch."
          exit 1

      - name: No conflicts
        if: steps.merge.outcome == 'success'
        run: echo "✅ No merge conflicts detected"
