name: Generate Agent Skills

on:
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual triggers

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Jules SDK
        # Appended @latest to pull the version with potential exports fixes
        run: npm install @google/jules-sdk@latest

      - name: Install Jules MCP
        # Appended @latest to pull the version with potential exports fixes
        run: npm install @google/jules-mcp@latest

      - name: Run Jules generator
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: node .github/scripts/jules-generate-agent-skills.mjs
