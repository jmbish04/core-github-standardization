name: Generate Agent Skills

on:
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual triggers

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jules SDK
        # Adjust the exact PyPI package name if different
        run: pip install google-jules-sdk==0.0.6

      - name: Install Jules MCP
        # Adjust the exact PyPI package name if different
        run: pip install google-jules-mcp==0.0.6

      - name: Run Jules generator
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: python .github/scripts/jules-generate-agent-skills.py
